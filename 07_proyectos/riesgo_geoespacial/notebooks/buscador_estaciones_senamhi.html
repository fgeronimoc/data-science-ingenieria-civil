<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscador Estaciones SENAMHI — Perú</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; display: flex; height: 100vh; overflow: hidden; }

  /* ── PANEL LATERAL IZQUIERDO ── */
  #sidebar {
    width: 320px;
    min-width: 320px;
    background: #f8f9fa;
    border-right: 2px solid #dee2e6;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    z-index: 500;
  }
  #sidebar-header {
    background: linear-gradient(135deg, #1A5276, #2980B9);
    color: white;
    padding: 14px 16px;
    font-size: 15px;
    font-weight: bold;
  }
  #sidebar-header small {
    display: block;
    font-size: 11px;
    font-weight: normal;
    opacity: 0.85;
    margin-top: 3px;
  }

  /* ── TABS GEO / UTM ── */
  .tab-buttons {
    display: flex;
    border-bottom: 2px solid #dee2e6;
  }
  .tab-btn {
    flex: 1;
    padding: 9px;
    border: none;
    background: #e9ecef;
    cursor: pointer;
    font-size: 13px;
    font-weight: bold;
    color: #495057;
    transition: all 0.2s;
  }
  .tab-btn.active {
    background: white;
    color: #1A5276;
    border-bottom: 3px solid #1A5276;
  }
  .tab-content { display: none; padding: 14px; }
  .tab-content.active { display: block; }

  label { font-size: 12px; color: #495057; font-weight: bold; display: block; margin-bottom: 3px; }
  input[type=number], select {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #ced4da;
    border-radius: 5px;
    font-size: 13px;
    margin-bottom: 10px;
    color: #212529;
    background: white;
  }
  input[type=number]:focus, select:focus {
    outline: none;
    border-color: #2980B9;
    box-shadow: 0 0 0 2px rgba(41,128,185,0.2);
  }

  #btn-buscar {
    width: 100%;
    padding: 10px;
    background: #1A5276;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 2px;
  }
  #btn-buscar:hover { background: #2980B9; }

  /* ── RESULTADOS ── */
  #results-section {
    padding: 12px 14px;
    border-top: 2px solid #dee2e6;
    flex: 1;
  }
  #results-title {
    font-size: 13px;
    font-weight: bold;
    color: #1A5276;
    margin-bottom: 8px;
  }
  #results-list { list-style: none; }
  #results-list li {
    background: white;
    border: 1px solid #dee2e6;
    border-left: 5px solid #ccc;
    border-radius: 5px;
    margin-bottom: 8px;
    padding: 9px 11px;
    font-size: 12px;
    cursor: pointer;
    transition: box-shadow 0.15s;
  }
  #results-list li:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .est-rank { font-weight: bold; font-size: 14px; }
  .est-name { font-weight: bold; font-size: 13px; color: #212529; }
  .est-meta { color: #6c757d; font-size: 11px; margin-top: 2px; }
  .est-dist { font-size: 13px; font-weight: bold; float: right; margin-top: -18px; }
  #coords-result {
    background: #EBF5FB;
    border: 1px solid #AED6F1;
    border-radius: 5px;
    padding: 8px 10px;
    font-size: 11px;
    color: #1A5276;
    margin-bottom: 10px;
    line-height: 1.6;
  }
  #error-msg {
    background: #FDEDEC;
    border: 1px solid #E74C3C;
    border-radius: 5px;
    padding: 8px 10px;
    font-size: 12px;
    color: #C0392B;
    margin-bottom: 8px;
    display: none;
  }

  /* ── MAPA ── */
  #map { flex: 1; height: 100vh; }

  /* Control de capas — posición top-right por defecto de Leaflet, sin superposición */
  .leaflet-top.leaflet-right { top: 10px; right: 10px; }
</style>
</head>
<body>

<!-- ═══════════════════════ PANEL IZQUIERDO ═══════════════════════ -->
<div id="sidebar">
  <div id="sidebar-header">
    🌦️ Buscador de Estaciones SENAMHI
    <small>Perú — 148 estaciones activas</small>
  </div>

  <!-- TABS -->
  <div class="tab-buttons">
    <button class="tab-btn active" onclick="switchTab('geo')">🌐 Geográficas</button>
    <button class="tab-btn"        onclick="switchTab('utm')">📐 UTM</button>
  </div>

  <!-- TAB GEOGRÁFICAS -->
  <div id="tab-geo" class="tab-content active">
    <label>Latitud (decimal, negativo = Sur)</label>
    <input type="number" id="geo-lat" step="0.000001" placeholder="Ej: -8.018000" value="-8.018">
    <label>Longitud (decimal, negativo = Oeste)</label>
    <input type="number" id="geo-lon" step="0.000001" placeholder="Ej: -78.568000" value="-78.568">
    <label>Nombre del proyecto</label>
    <input type="text"   id="geo-nombre" placeholder="Ej: Proyecto Sauco" value="Proyecto Sauco" style="margin-bottom:10px; padding:8px 10px; border:1px solid #ced4da; border-radius:5px; font-size:13px; width:100%;">
  </div>

  <!-- TAB UTM -->
  <div id="tab-utm" class="tab-content">
    <label>Zona UTM (Perú: 17, 18 o 19)</label>
    <select id="utm-zona">
      <option value="17">Zona 17S — Piura, Tumbes, sierra norte</option>
      <option value="18" selected>Zona 18S — Lima, Cusco, Puno (mayoría)</option>
      <option value="19">Zona 19S — Extremo este de Madre de Dios</option>
    </select>
    <label>Este / Easting (metros)</label>
    <input type="number" id="utm-este"  step="1" placeholder="Ej: 768071" value="768071">
    <label>Norte / Northing (metros)</label>
    <input type="number" id="utm-norte" step="1" placeholder="Ej: 9112918" value="9112918">
    <label>Nombre del proyecto</label>
    <input type="text"   id="utm-nombre" placeholder="Ej: Mi Proyecto" value="Proyecto Sauco (UTM)" style="margin-bottom:10px; padding:8px 10px; border:1px solid #ced4da; border-radius:5px; font-size:13px; width:100%;">
    <div style="font-size:10px; color:#888; margin-bottom:8px;">
      ℹ️ Hemisferio Sur (S) — WGS84. El sistema detecta la zona automáticamente.
    </div>
  </div>

  <div style="padding: 0 14px 10px 14px;">
    <button id="btn-buscar" onclick="buscar()">🔍 Buscar estaciones más cercanas</button>
  </div>

  <!-- ERROR -->
  <div id="error-msg" style="margin: 0 14px;"></div>

  <!-- RESULTADOS -->
  <div id="results-section" style="display:none;">
    <div id="coords-result"></div>
    <div id="results-title">📍 5 Estaciones activas más cercanas:</div>
    <ul id="results-list"></ul>
    <div style="font-size:10px; color:#aaa; margin-top:6px;">
      ✅ Solo estaciones activas | Fuente: SENAMHI — Perú
    </div>
  </div>
</div>

<!-- ═══════════════════════ MAPA ═══════════════════════ -->
<div id="map"></div>

const TIPOS = {"CO": "Climatológica Ordinaria", "CP": "Climatológica Principal", "PLU": "Pluviométrica", "HLG": "Hidrológica", "DCP": "Automática (DCP)"};

const COLORES = ['#E74C3C','#E67E22','#27AE60','#2980B9','#8E44AD'];

// ══════════════════════════════════════════════════════
// MAPA LEAFLET
// ══════════════════════════════════════════════════════
const map = L.map('map', { center: [-9.5, -75.5], zoom: 6 });

// ══════════════════════════════════════════════════════
// HAVERSINE
// ══════════════════════════════════════════════════════
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLon = (lon2-lon1) * Math.PI/180;
  const a = Math.sin(dLat/2)**2
    + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

// ══════════════════════════════════════════════════════
// CONVERSIÓN UTM → LAT/LON con proj4js
// ══════════════════════════════════════════════════════
function utmAGeo(zona, este, norte) {
  const epsg = 'EPSG:327' + String(zona).padStart(2,'0');
  // Definir proyección UTM WGS84 Zona xS
  const utmDef = '+proj=utm +zone=' + zona + ' +south +datum=WGS84 +units=m +no_defs';
  const geo = proj4(utmDef, 'WGS84', [este, norte]);
  return { lat: geo[1], lon: geo[0] };
}

// Lat/lon → UTM (detecta zona automáticamente)
function geoAUtm(lat, lon) {
  const zona = Math.floor((lon + 180) / 6) + 1;
  const utmDef = '+proj=utm +zone=' + zona + ' +south +datum=WGS84 +units=m +no_defs';
  const utm = proj4('WGS84', utmDef, [lon, lat]);
  return { zona, este: utm[0], norte: utm[1] };
}

// ══════════════════════════════════════════════════════
// TABS
// ══════════════════════════════════════════════════════
function switchTab(t) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&t==='geo')||(i===1&&t==='utm')));
  document.getElementById('tab-geo').classList.toggle('active', t==='geo');
  document.getElementById('tab-utm').classList.toggle('active', t==='utm');
}

// ══════════════════════════════════════════════════════
// BÚSQUEDA PRINCIPAL
// ══════════════════════════════════════════════════════
function buscar() {
  const errDiv = document.getElementById('error-msg');
  errDiv.style.display = 'none';

  let lat, lon, nombre;
  const isGeo = document.getElementById('tab-geo').classList.contains('active');

  try {
    if (isGeo) {
      lat    = parseFloat(document.getElementById('geo-lat').value);
      lon    = parseFloat(document.getElementById('geo-lon').value);
      nombre = document.getElementById('geo-nombre').value || 'Mi Proyecto';
      if (isNaN(lat)||isNaN(lon)) throw new Error('Ingresa valores numéricos válidos para lat/lon.');
      if (lat < -18.5 || lat > -0.5) throw new Error('Latitud fuera del rango de Perú (-18.5 a -0.5).');
      if (lon < -82 || lon > -68.5)  throw new Error('Longitud fuera del rango de Perú (-82 a -68.5).');
    } else {
      const zona  = parseInt(document.getElementById('utm-zona').value);
      const este  = parseFloat(document.getElementById('utm-este').value);
      const norte = parseFloat(document.getElementById('utm-norte').value);
      nombre = document.getElementById('utm-nombre').value || 'Mi Proyecto (UTM)';
      if (isNaN(este)||isNaN(norte)) throw new Error('Ingresa valores numéricos válidos para Este y Norte.');
      const geo = utmAGeo(zona, este, norte);
      lat = geo.lat; lon = geo.lon;
      if (lat < -19 || lat > 0 || lon < -83 || lon > -68)
        throw new Error('Coordenadas UTM fuera del rango esperado para Perú.');
    }
  } catch(e) {
    errDiv.textContent = '⚠️ ' + e.message;
    errDiv.style.display = 'block';
    return;
  }

  // Calcular distancias a todas las estaciones activas
  const conDist = ESTACIONES.map(e => ({
    ...e,
    dist_km: Math.round(haversine(lat, lon, e.lat, e.lon) * 10) / 10
  })).sort((a,b) => a.dist_km - b.dist_km).slice(0, 5);

  mostrarResultados(lat, lon, nombre, conDist, isGeo);
}

// ══════════════════════════════════════════════════════
// MOSTRAR RESULTADOS EN MAPA + PANEL
// ══════════════════════════════════════════════════════
function mostrarResultados(lat, lon, nombre, estaciones, isGeo) {
  markersLayer.clearLayers();
  linesLayer.clearLayers();
  proyectoLayer.clearLayers();

  // Coordenadas convertidas

  // Marcador del proyecto

   .bindPopup(`<b>🏗️ ${nombre}</b><br>
     Lat: ${lat.toFixed(6)}° | Lon: ${lon.toFixed(6)}°<br>
     UTM Z${utm.zona}S: ${Math.round(utm.este).toLocaleString()}E, ${Math.round(utm.norte).toLocaleString()}N`)
   .addTo(proyectoLayer);

  // Lista de resultados
  const lista = document.getElementById('results-list');
  lista.innerHTML = '';

  estaciones.forEach((e, i) => {
    const color = COLORES[i];
    const utm_e = geoAUtm(e.lat, e.lon);

    // Marcador estación
    const iconEst = L.divIcon({
      html: `<div style="background:${color};color:white;border-radius:50%;width:26px;height:26px;
                   display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:12px;
                   box-shadow:0 2px 5px rgba(0,0,0,0.3);border:2px solid white;">${i+1}</div>`,
      iconSize: [26,26], iconAnchor: [13,13]
    });
    L.marker([e.lat, e.lon], {icon: iconEst})
     .bindPopup(`
       <div style="font-family:Arial;font-size:12px;min-width:220px">
         <div style="background:${color};color:white;padding:5px 8px;border-radius:3px;font-weight:bold;margin-bottom:6px">
           #${i+1} — ${e.nombre}
         </div>
         <b>Código SENAMHI:</b> ${e.codigo}<br>
         <b>Tipo:</b> ${e.tipo} — ${TIPOS[e.tipo] || e.tipo}<br>
         <b>Estado:</b> ✅ Activa<br>
         <hr style="margin:5px 0">
         <b>📍 Ubicación</b><br>
         ${e.dist}, ${e.prov}, ${e.dpto}<br>
         <b>Elevación:</b> ${e.elev.toLocaleString()} m.s.n.m.<br>
         <hr style="margin:5px 0">
         <b>🌐 Geográficas:</b> ${e.lat.toFixed(5)}°, ${e.lon.toFixed(5)}°<br>
         <b>📐 UTM Z${utm_e.zona}S:</b> ${Math.round(utm_e.este).toLocaleString()}E, ${Math.round(utm_e.norte).toLocaleString()}N<br>
         <hr style="margin:5px 0">
         <b style="color:${color}">📏 Distancia: ${e.dist_km} km</b>
       </div>`, {maxWidth: 280})
     .addTo(markersLayer);

    // Línea punteada
    const line = L.polyline([[lat,lon],[e.lat,e.lon]], {
      color: color, weight: 2, opacity: 0.7, dashArray: '6 4'
    }).addTo(linesLayer);

    // Etiqueta distancia en el punto medio
    const midLat = (lat+e.lat)/2, midLon = (lon+e.lon)/2;
    L.marker([midLat, midLon], {
      icon: L.divIcon({
        html: `<div style="background:${color};color:white;padding:2px 6px;border-radius:10px;

                     box-shadow:1px 1px 3px rgba(0,0,0,0.3)">${e.dist_km} km</div>`,
        iconSize: [60,18], iconAnchor: [30,9]
      })
    }).addTo(linesLayer);

    // Ítem de lista lateral
    const li = document.createElement('li');
    li.style.borderLeftColor = color;
    li.innerHTML = `
      <span class="est-rank" style="color:${color}">#${i+1}</span>
      <span class="est-dist" style="color:${color}">${e.dist_km} km</span>
      <span class="est-name">${e.nombre}</span>
      <div class="est-meta">
        ${e.tipo} · ${TIPOS[e.tipo] || ''} · ${e.elev.toLocaleString()} m.s.n.m.<br>
        ${e.dist}, ${e.prov}, ${e.dpto}
      </div>`;
    li.onclick = () => map.setView([e.lat, e.lon], 12);
    lista.appendChild(li);
  });

  document.getElementById('results-section').style.display = 'block';

  // Zoom automático para mostrar proyecto + estaciones
  const bounds = L.latLngBounds([[lat,lon], ...estaciones.map(e=>[e.lat,e.lon])]);
  map.fitBounds(bounds.pad(0.15));
}

// Búsqueda inicial automática
window.addEventListener('load', () => buscar());
